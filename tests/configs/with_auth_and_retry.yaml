gateway:
  port: 8080
  global_timeout: "10s"

routes:
  - path: "/secure"
    methods: ["GET", "POST"]
    upstream:
      url: "http://localhost:6001"
    auth:
      type: "api_key"
      header: "Authorization"
      keys: ["key-1", "key-2", "key-3"]

  - path: "/flaky"
    methods: ["GET"]
    upstream:
      url: "http://localhost:6002"
      timeout: "2s"
    retry:
      attempts: 5
      backoff: "fixed"
      initial_delay: "500ms"
      on: [500, 502, 503]
